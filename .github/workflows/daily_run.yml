name: Daily Startup Cold Email Run

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC every day
  workflow_dispatch:        # Allow manual trigger from the Actions tab

# Prevent concurrent runs — ensures leads.csv commits never race each other
concurrency:
  group: cold-email-run
  cancel-in-progress: false

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit leads.csv back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0    # Full history needed for reliable rebase

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run automation
        env:
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python main.py

      - name: Commit updated leads.csv
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leads.csv
          if git diff --staged --quiet; then
            echo "leads.csv unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "chore: update leads.csv [skip ci]"

          # Retry push up to 3 times with proper rebase handling
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              if git push; then
                echo "Push succeeded on attempt $i"
                break
              else
                echo "Push failed on attempt $i, retrying in 5s..."
                sleep 5
              fi
            else
              echo "Rebase failed on attempt $i, retrying in 5s..."
              git rebase --abort
              sleep 5
            fi
          done
